<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secure Pass - Complaint Registration</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; background: #f3f4f6; color: #0f172a; padding: 24px; }
      .container { max-width: 720px; margin: 32px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 6px 24px rgba(2,6,23,0.08);} 
      h1 { margin-top: 0 }
      .field { display:flex; flex-direction:column; margin-bottom:12px }
      label { font-weight:600; margin-bottom:6px }
      input[type=text], input[type=email], textarea { padding:10px 12px; border:1px solid #e6e9ee; border-radius:8px; font-size:14px }
      button { background:#6c63ff; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:700 }
      .result { margin-top:14px; padding:12px; border-radius:8px; background:#f1f5f9 }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Register a Complaint</h1>
      <p>No login required — scan the QR code and submit the form below.</p>
      <form id="complaintForm" method="post" action="/api/complaints" enctype="multipart/form-data">
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="details">Complaint details</label>
          <textarea id="details" name="details" rows="6" required></textarea>
        </div>
        <div class="field">
          <label for="image">Attach image (optional)</label>
          <input id="image" name="image" type="file" accept="image/*" />
        </div>
        <button type="submit">Submit Complaint</button>
      </form>
      <div id="result" class="result" style="display:none"></div>
    </div>

    <script>
      const form = document.getElementById('complaintForm');
      const result = document.getElementById('result');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        result.style.display = 'none';
        const fd = new FormData(form);
        try {
          const res = await fetch(form.action, { method: 'POST', body: fd });
          const data = await res.json();
          if (res.ok && data.success) {
            result.style.display = 'block';
            result.innerHTML = `<strong>Submitted</strong><br/>Your ticket: ${data.ticket}`;
            form.reset();
          } else {
            result.style.display = 'block';
            result.innerText = data.message || 'Submission failed';
          }
        } catch (err) {
          result.style.display = 'block';
          result.innerText = 'Network error: ' + err.message;
        }
      });
    </script>
  </body>
</html>
